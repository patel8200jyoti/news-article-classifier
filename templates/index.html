<!DOCTYPE html>
<html>
<head>
    <title>News Classifier</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            resize: none;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
        }

        .category {
            color: #e91e63;
        }

    </style>
</head>
<body>

<div class="card">
    <h2>📰 News Article Classifier</h2>

    <form method="POST">
        <textarea name="news" placeholder="Enter news text here..."></textarea>
        <br>
        <button type="submit">Predict Category</button>
    </form>

    {% if prediction %}
        <div class="result">
            Predicted Category:
            <span class="category">{{ prediction }}</span>
        </div>
    {% endif %}
</div>

</body>
</html>
